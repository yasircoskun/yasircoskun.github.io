<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/3.1.2/rollups/aes.js"></script>

<script>
function httpGet(theUrl) {
  var xmlHttp = new XMLHttpRequest();
  xmlHttp.open("GET", theUrl.indexOf('?') != -1 ? theUrl + '&nocache=' + new Date().getTime() : theUrl + '?nocache=' + new Date().getTime(), false);
  xmlHttp.send(null);
  return xmlHttp.responseText;
}

function decrypt(message = '', key = '') {
  var code = CryptoJS.AES.decrypt(message, key);
  var decryptedMessage = code.toString(CryptoJS.enc.Utf8);

  return decryptedMessage;
}

function getJsonFromUrl(url) {
  if(!url) url = location.search;
  var query = url.substr(1);
  var result = {};
  query.split("&").forEach(function(part) {
    var item = part.split("=");
    result[item[0]] = decodeURIComponent(item[1]);
  });
  return result;
}

function getSecrets() {
  let secret = httpGet(location.origin +'/secret~env.enc')
  let password = prompt('secret');
  return JSON.parse(decrypt(secret, password))
}

var secret = getSecrets()

var data = {
  client_id: secret["github_oauth"]["client_id"],
  client_secret: secret["github_oauth"]["secret_id"],
  code: getJsonFromUrl()['code']
}

data = JSON.stringify(data);

var xmlHttp = new XMLHttpRequest();
xmlHttp.withCredentials = true;

xmlHttp.open("POST", "https://github.com/login/oauth/access_token", false);
xmlHttp.setRequestHeader("Accept", "application/json");
xmlHttp.setRequestHeader("Content-Type", "application/json");

xmlHttp.send(data);

localStorage.setItem('github_access_token', xmlHttp.responseText);

location.href = locatin.origin;

//xmlHttp.setRequestHeader("Authorization", "token "+JSON.parse(localStorage.getItem(github_access_token))['access_token']);
</script>
